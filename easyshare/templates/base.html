<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Easy Share{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header><a class="brand" href="{{ url_for('index') }}">Easy Share</a>{% if session.authenticated %}<form action="{{ url_for('logout') }}" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="link" type="submit">退出</button></form>{% endif %}</header>
<main>
{% with messages = get_flashed_messages(with_categories=true) %}{% for category, message in messages %}<div class="notice {{ category }}">{{ message }}</div>{% endfor %}{% endwith %}
{% block content %}{% endblock %}
</main>
<footer>私有、安全、简单的文件中转站</footer>
</body>
</html>
