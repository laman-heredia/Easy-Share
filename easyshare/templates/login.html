{% extends 'base.html' %}
{% block title %}登录 · Easy Share{% endblock %}
{% block content %}
<section class="login-shell">
  <div class="login-visual">
    <span class="eyebrow light">YOUR PRIVATE CLOUD</span>
    <h1>你的文件，<br>只属于你。</h1>
    <p>简单、安全的私人文件空间，在任何设备上轻松访问。</p>
    <div class="security-points">
      <span><b>✓</b> 登录访问保护</span>
      <span><b>✓</b> HTTPS 安全传输</span>
      <span><b>✓</b> 私有服务器存储</span>
    </div>
  </div>
  <div class="login-panel">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24"><rect x="4" y="10" width="16" height="11" rx="3"/><path d="M8 10V7a4 4 0 0 1 8 0v3m-4 5v2"/></svg>
    </div>
    <h2>欢迎回来</h2>
    <p>输入访问密码，进入你的文件空间。</p>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label for="password">访问密码</label>
      <div class="password-field">
        <svg viewBox="0 0 24 24"><rect x="4" y="10" width="16" height="11" rx="3"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
        <input id="password" name="password" type="password" placeholder="请输入密码" required autofocus autocomplete="current-password">
      </div>
      <button class="primary-button login-button" type="submit">安全登录 <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></button>
    </form>
    <small class="privacy-note"><span>✓</span> 你的密码不会被记录或分享</small>
  </div>
</section>
{% endblock %}
